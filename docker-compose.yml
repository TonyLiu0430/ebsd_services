services:
  ml_backend:
    build:
      context: ./ML_backend
      network: host # uv 下載 Python wheels 時避免 Docker build DNS 抖動
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      GO_BACKEND_URL: "http://go_backend:8080"
    depends_on:
      postgres:
        condition: service_healthy
      go_backend:
        condition: service_started

  cpp_backend:
    build:
      context: ./cpp_backend
      network: host # vcpkg 會出事 DO NOT EDIT!
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"

  go_backend:
    build: 
      context: ./go_backend
      network: host # DO NOT EDIT
    ports:
      - "8051:8080"
    environment:
      DATABASE_CONNECTION_STRING: "dbname=${POSTGRES_DB} user=${POSTGRES_USER} password=${POSTGRES_PASSWORD} host=postgres port=5432 sslmode=disable"
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SECRET: ${AUTH_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - frontend
      - cpp_backend
      - ml_backend

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL:-}
    depends_on:
      - caddy
    profiles: ["tunnel"]

volumes:
  pgdata:
